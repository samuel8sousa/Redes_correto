<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  >

  <title>Formulário de E-mail</title>
</head>

<body>
  <div id="alerta" class="alerta escondido"></div>

  <button type="button" class="back-btn" id="voltar-btn">
    ← Voltar
  </button>

  <main class="main2">

    <form id="email-form" class="email-form">
      <h2>Formulário de E-mail</h2>

      <div class="form-group">
        <label for="remetente">Remetente:</label>
        <input
          id="remetente"
          name="remetente"
          type="email"
          placeholder="exemplo@dominio.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="destinatario">Destinatário:</label>
        <input
          id="destinatario"
          name="destinatario"
          type="email"
          placeholder="destino@dominio.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="assunto">Assunto:</label>
        <input
          id="assunto"
          name="assunto"
          type="text"
          placeholder="Digite o assunto do e-mail"
          required
        >
      </div>

      <div class="form-group">
        <label for="corpo">Corpo do e-mail:</label>
        <textarea
          id="corpo"
          name="corpo"
          placeholder="Digite a mensagem do e-mail"
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label for="protocolo">Protocolo:</label>
        <select id="protocolo" name="protocolo" required>
          <option value="">Selecione um protocolo</option>
          <option value="SMTP">SMTP - Envio de e-mail</option>
          <option value="POP3">POP3 - Recebimento de e-mail</option>
          <option value="IMAP">IMAP - Sincronização de e-mail</option>
        </select>
      </div>

      <button type="submit" class="email-btn">
        Concluir
      </button>
    </form>

    <div class="email-result">
      <h2>Objeto gerado:</h2>
      <pre id="email-preview"></pre>
    </div>

  </main>

  <script type="module" src="./script/script.js"></script>
</body>

</html>
